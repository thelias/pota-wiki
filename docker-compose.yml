services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pnw_pota
      POSTGRES_USER: pota
      POSTGRES_PASSWORD: pota_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build: ./server
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://pota:pota_dev@db:5432/pnw_pota
      PORT: 3000
      UPLOADS_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
